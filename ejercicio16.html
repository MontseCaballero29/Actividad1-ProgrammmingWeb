<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculadora de números</title>

    <link rel="stylesheet" href="css/ejercicio16.css">
</head>

<body>

    <div class="contenedor-formulario">
        <h1>Calculadora</h1>
        <p class="subtitulo">Ingresa dos números y selecciona una operación.</p>

        <div class="grupo-formulario">
            <label for="numero1">Primer número</label>
            <input
                type="text"
                id="numero1"
                placeholder="Ejemplo: 10">
        </div>

        <div class="grupo-formulario">
            <label for="numero2">Segundo número</label>
            <input
                type="text"
                id="numero2"
                placeholder="Ejemplo: 5">
        </div>


        <div class="grupo-botones">
            <button
                type="button"
                class="boton-operacion"
                onclick="calcularOperacion('suma')">Sumar</button>

            <button
                type="button"
                class="boton-operacion"
                onclick="calcularOperacion('resta')">Restar</button>

            <button
                type="button"
                class="boton-operacion"
                onclick="calcularOperacion('multiplicacion')">Multiplicar</button>

            <button
                type="button"
                class="boton-operacion"
                onclick="calcularOperacion('division')">Dividir</button>
        </div>

        <div class="grupo-formulario resultado">
            <label for="resultado">Resultado</label>
            <input
                type="text"
                id="resultado"
                readonly
                tabindex="-1"></div>
            </div>

    <!-- SweetAlert2 -->
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

    <script src="js/ejercicio16.js"></script>

</body>

</html>
