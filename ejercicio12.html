<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Convertidor de pesos mexicanos a dólares</title>
    <link rel="stylesheet" href="css/ejercicio12.css">
</head>
<body>

    <div class="contenedor">
        <h1>Conversor</h1>

        <label for="numeroConvertir" class="etiqueta">Pesos MXN (mexicanos):</label>

        <input type="number" id="numeroConvertir" class="numeroConvertir" placeholder="Ejemplo: 10" min="0" step="0.01">

        <button onclick="convertir()" class="boton">Convertir</button>

        <label for="numeroConvertido" class="etiqueta">Dólares (USD):</label>

        <!-- readonly evita que el usuario cambie manualmente el resultado -->
        <input type="text" id="numeroConvertido" class="numeroConvertido" readonly tabindex="-1">
    </div>

    <script src="js/ejercicio12.js"></script>
</body>
</html>
