<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestión de Tareas</title>
    <link rel="stylesheet" href="css/ejercicio17.css">
</head>

<body>
    <div class="contenedor-formulario">
        <h1>Gestión de Tareas</h1>
        <p class="subtitulo">Agrega y administra tus tareas pendientes.</p>

        <div class="grupo-formulario">
            <label for="tarea">Nueva tarea</label>
            <input
                type="text"
                id="tarea"
                placeholder="Ejemplo: Estudiar JavaScript">
        </div>

        <button
            type="button"
            class="boton-agregar"
            onclick="agregarTarea()">Agregar Tarea</button>

        <div class="contenedor-tareas">
            <h2>Tareas pendientes</h2>
            <div id="listaTareas">
            </div>
        </div>
    </div>


    <!-- SweetAlert2 -->
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

    <script src="js/ejercicio17.js"></script>

</body>

</html>
