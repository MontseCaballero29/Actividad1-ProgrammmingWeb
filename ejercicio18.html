<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manipulación del DOM</title>
    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- CSS -->
    <link rel="stylesheet" href="css/ejercicio18.css">
</head>

<body>
    <div class="container">
        <div class="contenedor">
            <h1 class="text-center mb-4">Agregar y Eliminar Elementos</h1>

            <div class="mb-3">
                <label for="nuevoElemento" class="form-label">Nuevo elemento</label>

                <input
                    type="text"
                    id="nuevoElemento"
                    class="form-control"
                    placeholder="Escribe algo">
            </div>

            <button id="agregarBtn" class="btn btn-primary w-100">Agregar</button>
            <ul id="lista" class="mt-4"></ul>
        </div>
    </div>

    <!-- JavaScript -->
    <script src="js/ejercicio18.js"></script>
</body>

</html>
