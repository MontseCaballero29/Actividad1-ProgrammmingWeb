<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ejercicio 13 - ¿Puedes votar?</title>
    <link rel="stylesheet" href="css/ejercicio13.css">
</head>
<body>

    <div class="contenedor">
        <h1>¿Puedes votar?</h1>

        <label for="numeroConvertir" class="etiqueta">Ingresa tu edad:</label>

        <input type="number" id="numeroConvertir" class="numeroConvertir" placeholder="Ejemplo: 10" min="0" step="1"> <br><br>

        <button onclick="convertir()" class="boton">Verificar</button> <br> <br>

        <label for="numeroConvertido" class="etiqueta">Tú</label>

        <!-- readonly evita que el usuario cambie manualmente el resultado -->
        <input type="text" id="numeroConvertido" class="numeroConvertido" readonly tabindex="-1">
    </div>

    <script src="js/ejercicio13.js"></script>
</body>
</html>
